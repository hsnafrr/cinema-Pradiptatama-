<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pradiptatama 26 Cinema - SMA N 1 Sleman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--black); 
            color: #ffffff; 
        }

        .font-luxury { font-family: 'Playfair Display', serif; }

        .glass-card { 
            background: rgba(20, 20, 20, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
        }

        .bg-gold { background: linear-gradient(135deg, #D4AF37 0%, #F9E2AF 50%, #B8860B 100%); }
        .text-gold { color: var(--gold); }

        input, select { 
            background: rgba(255, 255, 255, 0.05) !important; 
            border: 1px solid rgba(212, 175, 55, 0.3) !important; 
            color: white !important; 
        }

        .movie-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(212, 175, 55, 0.1);
            aspect-ratio: 2 / 3;
        }

        .movie-card.selected {
            border: 2px solid var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .poster-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (min-width: 768px) {
            .poster-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

    <div id="app" class="max-w-5xl mx-auto">
        
        <div class="text-center mb-12">
            <img src="logo_sma1sleman.png" alt="Logo SMA 1 Sleman" class="w-24 mx-auto mb-4">
            <h1 class="text-4xl md:text-6xl font-luxury font-bold text-gold tracking-tight">Pradiptatama 26 Cinema</h1>
            <p class="text-slate-400 mt-2 tracking-[0.2em] uppercase text-sm">SMA Negeri 1 Sleman</p>
        </div>

        <div id="view-reservation" class="glass-card p-6 md:p-10 rounded-3xl shadow-2xl">
            <form id="reservationForm" class="space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-gold font-bold">Nama Lengkap</label>
                        <input type="text" id="reg-name" required class="w-full px-4 py-4 rounded-xl" placeholder="Contoh: Budi Santoso">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-gold font-bold">Kelas</label>
                        <select id="reg-class" required class="w-full px-4 py-4 rounded-xl outline-none">
                            <option value="" disabled selected>Pilih Kelas</option>
                            <optgroup label="Grade X"><option>XA</option><option>XB</option><option>XC</option><option>XD</option><option>XE</option><option>XF</option><option>XG</option></optgroup>
                            <optgroup label="Grade XI"><option>XIA</option><option>XIB</option><option>XIC</option><option>XID</option><option>XIE</option><option>XIF</option><option>XIG</option></optgroup>
                            <optgroup label="Grade XII"><option>XIIA</option><option>XIIB</option><option>XIIC</option><option>XIID</option><option>XIIE</option><option>XIIF</option><option>XIIG</option></optgroup>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-gold font-bold">Nomor WhatsApp</label>
                        <input type="tel" id="reg-phone" required class="w-full px-4 py-4 rounded-xl" placeholder="0812...">
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="flex justify-between items-end border-b border-gold/20 pb-2">
                        <h3 class="text-xl font-luxury text-gold">Pilih Film</h3>
                        <p id="selection-count" class="text-xs text-slate-400 italic">0 terpilih</p>
                    </div>
                    <div class="poster-grid" id="poster-grid"></div>
                </div>

                <button type="submit" id="btn-reserve" class="w-full bg-gold py-5 rounded-xl font-bold text-black shadow-xl hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3 text-lg uppercase tracking-widest">
                    Konfirmasi Reservasi <i data-lucide="ticket" size="20"></i>
                </button>
            </form>
        </div>

        <div id="view-ticket" class="hidden max-w-xl mx-auto">
            <div id="ticket-capture" class="glass-card rounded-3xl overflow-hidden border border-gold/50 p-8 bg-[#0a0a0a]">
                <div class="text-center border-b border-gold/30 pb-6 mb-6">
                    <img src="logo_sma1sleman.png" class="w-12 mx-auto mb-2">
                    <h2 class="text-2xl font-luxury text-white">Pradiptatama 26 Cinema</h2>
                </div>
                <div class="flex flex-wrap justify-center gap-2 py-4" id="ticket-poster-row"></div>
                <div class="space-y-4 py-6 border-y border-gold/20">
                    <div><p class="text-[9px] uppercase text-gold">Nama Penonton</p><p id="disp-name" class="font-bold text-white"></p></div>
                    <div><p class="text-[9px] uppercase text-gold">Kelas</p><p id="disp-class" class="font-bold text-white"></p></div>
                    <div><p class="text-[9px] uppercase text-gold">Film Terdaftar</p><p id="disp-movies" class="text-xs text-slate-300"></p></div>
                </div>
                <div class="mt-6 text-center text-[10px] text-gold/50 uppercase tracking-widest">Valid Entry Pass - SMA N 1 Sleman</div>
            </div>
            <button onclick="downloadTicket()" class="w-full bg-gold mt-6 py-4 rounded-xl font-bold text-black flex items-center justify-center gap-2">
                <i data-lucide="download" size="18"></i> Download Tiket (.PNG)
            </button>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8s_2p-oYoTyGwuAzs61-XpQpSSHifSUSEWOVqTTSymelrS3qNerafyWmvTl_H121RlQ/exec"; 

        const MOVIES = [
            { id: 1, title: "Dia?", time: "09:10–09:25", poster: "dia.jpg", syn: "Siswa SMA berubah sikap setelah tersenyum adik kelas." },
            { id: 2, title: "2/4 Kawan", time: "09:27–09:42", poster: "24kawan.jpg", syn: "Empat sahabat SMA renggang akibat konflik dan waktu." },
            { id: 3, title: "The Sound of Us: Suara Kita", time: "09:44–09:59", poster: "soundofus.jpg", syn: "Siswa SMA hadapi tekanan kelulusan dan ekonomi." },
            { id: 4, title: "Titik Tengah", time: "10:01–10:16", poster: "titiktengah.jpg", syn: "Tiga tipe siswa yang saling melengkapi saat ujian." },
            { id: 5, title: "Diantara Kita", time: "10:18–10:33", poster: "diantarakita.jpg", syn: "Persahabatan dan cinta diam-diam di bangku sekolah." },
            { id: 6, title: "Dua Sisi Kursi", time: "10:35–10:50", poster: "duasisikursi.jpg", syn: "Perebutan jurusan SNBP memicu konflik sahabat." },
            { id: 7, title: "Broken Symphony", time: "10:52–11:07", poster: "brokensymphony.jpg", syn: "Siswi suara emas yang kembali menemukan percaya diri." },
            { id: 8, title: "Hening di Tengah Suara", time: "11:09–11:24", poster: "heningdisuara.jpg", syn: "Kisah siswa pendiam yang takut bersosialisasi." },
            { id: 9, title: "Irama Dua Nada", time: "11:26–11:41", poster: "iramaduanada.jpg", syn: "Konflik kakak-adik dalam persiapan pertunjukan seni." },
            { id: 10, title: "Melo Di Balik Panggung", time: "11:43–11:58", poster: "melodibalikpanggung.jpg", syn: "Keseimbangan antara ekonomi, sekolah, dan mimpi." },
            { id: 11, title: "Langkah Yang Salah", time: "12:30–12:45", poster: "langkahsalah.jpg", syn: "Kendala lomba yang menguji mimpi seorang siswi seni." },
            { id: 12, title: "Mungkin", time: "12:47–13:02", poster: "mungkin.jpg", syn: "Tekanan ekspektasi pada sahabat yang berprestasi." },
            { id: 13, title: "Derap Sunyi", time: "13:04–13:19", poster: "derapsunyi.jpg", syn: "Perjuangan siswa mengurus keluarga pasca ayah tiada." },
            { id: 14, title: "Meraih Cahaya di Atas Bayangan", time: "13:21–13:36", poster: "meraihcahaya.jpg", syn: "Harapan baru bagi siswa yang bermasalah." },
            { id: 15, title: "Dari Rakyat Untuk Rakyat", time: "13:38–13:53", poster: "dariRakyat.jpg", syn: "Perjuangan Tika melawan ketidakadilan demi rakyat." },
            { id: 16, title: "Terlena Dalam Waktu", time: "13:55–14:10", poster: "terlena.jpg", syn: "Penyesalan pecandu game atas hasil ujiannya." },
            { id: 17, title: "Isak Pertiwi", time: "14:12–14:27", poster: "isakpertiwi.jpg", syn: "Gelisah pelajar atas lingkungan yang makin rusak." },
            { id: 18, title: "Melodi Untuk Ibu", time: "14:29–14:44", poster: "melodiuntukibu.jpg", syn: "Perjuangan gadis desa menjadi penyanyi demi ibunya." }
        ];

        let selectedMovies = [];

        function renderPosterGrid() {
            const grid = document.getElementById('poster-grid');
            grid.innerHTML = MOVIES.map(movie => `
                <div class="movie-card bg-neutral-900 rounded-xl overflow-hidden cursor-pointer relative group" onclick="toggleSelect(${movie.id})" id="card-${movie.id}">
                    <img src="${movie.poster}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-opacity p-4 flex flex-col justify-end">
                        <p class="text-gold text-[10px] font-bold">${movie.time}</p>
                        <p class="text-white text-[9px] leading-tight">${movie.syn}</p>
                    </div>
                    <div class="absolute bottom-0 w-full p-2 bg-black/60 backdrop-blur-sm text-center">
                        <p class="text-[9px] font-bold truncate text-white uppercase">${movie.title}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleSelect(id) {
            const card = document.getElementById(`card-${id}`);
            const index = selectedMovies.findIndex(m => m.id === id);
            if(index > -1) {
                selectedMovies.splice(index, 1);
                card.classList.remove('selected');
            } else {
                selectedMovies.push(MOVIES.find(m => m.id === id));
                card.classList.add('selected');
            }
            document.getElementById('selection-count').innerText = `${selectedMovies.length} terpilih`;
        }

        document.getElementById('reservationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(selectedMovies.length === 0) return alert("Pilih minimal 1 film!");

            const btn = document.getElementById('btn-reserve');
            btn.disabled = true;
            btn.innerText = "MENGIRIM...";

            const payload = {
                phase: 'RESERVE',
                timestamp: new Date().toLocaleString(),
                name: document.getElementById('reg-name').value,
                class: document.getElementById('reg-class').value,
                phone: document.getElementById('reg-phone').value,
                movies: selectedMovies.map(m => m.title).join(', ')
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            } catch(e) {}

            document.getElementById('disp-name').innerText = payload.name;
            document.getElementById('disp-class').innerText = payload.class;
            document.getElementById('disp-movies').innerText = payload.movies;
            document.getElementById('ticket-poster-row').innerHTML = selectedMovies.map(m => `<img src="${m.poster}" class="w-12 h-16 rounded border border-gold/30">`).join('');
            
            document.getElementById('view-reservation').classList.add('hidden');
            document.getElementById('view-ticket').classList.remove('hidden');
            lucide.createIcons();
        });

        async function downloadTicket() {
            const ticket = document.getElementById('ticket-capture');
            const canvas = await html2canvas(ticket, { backgroundColor: '#0a0a0a', scale: 2 });
            const link = document.createElement('a');
            link.download = `Tiket_Cinema26_${document.getElementById('disp-name').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        window.onload = () => { renderPosterGrid(); lucide.createIcons(); };
    </script>
</body>
</html>
