<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pradiptatama 26 Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        :root { --gold: #D4AF37; --black: #0a0a0a; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--black); 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .font-luxury { font-family: 'Playfair Display', serif; }
        .text-gold { color: var(--gold); }
        .bg-gold { background: linear-gradient(135deg, #D4AF37 0%, #F9E2AF 50%, #B8860B 100%); }

        .glass-card { 
            background: rgba(25, 25, 25, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
        }

        .movie-card {
            aspect-ratio: 2 / 3;
            transition: transform 0.2s;
        }

        .movie-card.selected {
            border: 3px solid var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }

        /* Mencegah zoom otomatis pada input iOS */
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="pb-20">

    <header class="text-center py-10 px-4">
        <img src="logo_sma1sleman.png" alt="Logo" class="w-20 mx-auto mb-4 drop-shadow-[0_0_10px_rgba(212,175,55,0.5)]">
        <h1 class="text-3xl font-luxury text-gold font-bold">Pradiptatama 26 Cinema</h1>
        <p class="text-[10px] tracking-[0.3em] uppercase text-slate-400">SMA Negeri 1 Sleman</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 space-y-10">
        
        <section id="movie-section">
            <div class="flex justify-between items-end mb-4 border-b border-gold/20 pb-2">
                <h2 class="font-luxury text-xl text-gold">Pilih Jadwal Film</h2>
                <span id="selection-count" class="text-[10px] bg-gold text-black px-2 py-1 rounded-full font-bold uppercase">0 Terpilih</span>
            </div>
            
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="poster-grid">
                </div>
        </section>

        <section id="registration-section" class="glass-card p-6 rounded-3xl shadow-2xl space-y-6 scroll-mt-10">
            <div class="text-center">
                <h2 class="font-luxury text-2xl text-gold">Data Penonton</h2>
                <p class="text-xs text-slate-400">Silakan lengkapi data untuk tiket</p>
            </div>

            <form id="reservationForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest text-gold font-bold ml-1">Nama Lengkap</label>
                    <input type="text" id="reg-name" required class="w-full bg-white/5 border border-gold/30 px-4 py-3 rounded-xl focus:border-gold outline-none text-white" placeholder="Masukkan nama...">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest text-gold font-bold ml-1">Kelas / Jabatan</label>
                    <select id="reg-class" required class="w-full bg-[#1a1a1a] border border-gold/30 px-4 py-3 rounded-xl outline-none text-white appearance-none">
                        <option value="" disabled selected>Pilih Kelas/Guru</option>
                        <optgroup label="Siswa">
                            <option>Kelas X</option><option>Kelas XI</option><option>Kelas XII</option>
                        </optgroup>
                        <optgroup label="Pendidik & Staff">
                            <option>Guru</option>
                            <option>Staff</option>
                            <option>Tamu Undangan</option>
                        </optgroup>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest text-gold font-bold ml-1">Nomor WhatsApp</label>
                    <input type="tel" id="reg-phone" required class="w-full bg-white/5 border border-gold/30 px-4 py-3 rounded-xl outline-none text-white" placeholder="0812...">
                </div>

                <div class="pt-4">
                    <button type="submit" id="btn-reserve" class="w-full bg-gold py-4 rounded-2xl font-bold text-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-sm">
                        Ambil Tiket Sekarang <i data-lucide="ticket" size="18"></i>
                    </button>
                </div>
            </form>
        </section>

        <section id="view-ticket" class="hidden py-6">
            <div id="ticket-capture" class="glass-card rounded-[2.5rem] overflow-hidden border border-gold/50 p-6 bg-[#0a0a0a]">
                <div class="text-center border-b border-gold/20 pb-4 mb-4">
                    <img src="logo_sma1sleman.png" class="w-12 mx-auto mb-2">
                    <h2 class="text-xl font-luxury text-white">Cinema Pass</h2>
                </div>
                <div class="flex flex-wrap justify-center gap-2 py-2" id="ticket-poster-row"></div>
                <div class="space-y-4 py-4 text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <div><p class="text-[8px] uppercase text-gold">Penonton</p><p id="disp-name" class="font-bold text-white uppercase"></p></div>
                        <div><p class="text-[8px] uppercase text-gold">Kelas/Guru</p><p id="disp-class" class="font-bold text-white uppercase"></p></div>
                    </div>
                    <div><p class="text-[8px] uppercase text-gold">Film Terdaftar</p><p id="disp-movies" class="text-xs text-slate-300 leading-tight"></p></div>
                </div>
                <div class="mt-4 text-center text-[8px] text-gold/50 tracking-[0.3em] uppercase font-bold">SMA N 1 Sleman</div>
            </div>
            <button onclick="downloadTicket()" class="w-full bg-gold mt-4 py-4 rounded-xl font-bold text-black flex items-center justify-center gap-2 text-sm">
                <i data-lucide="download" size="18"></i> SIMPAN TIKET KE GALERI
            </button>
        </section>
    </main>

    <div id="movie-modal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/90">
        <div class="glass-card w-full max-w-lg rounded-t-[2rem] sm:rounded-[2rem] overflow-hidden animate-slide-up shadow-2xl border-gold/40">
            <div class="relative">
                <img id="modal-img" class="w-full h-64 object-cover">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 text-white p-2 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <h2 id="modal-title" class="text-2xl font-luxury text-gold leading-tight"></h2>
                    <p id="modal-time" class="text-[10px] font-bold text-white bg-gold/20 inline-block px-3 py-1 rounded-full border border-gold/30 mt-2"></p>
                </div>
                <div class="max-h-40 overflow-y-auto">
                    <p id="modal-synopsis" class="text-xs text-slate-300 leading-relaxed italic"></p>
                </div>
                <button id="modal-select-btn" class="w-full bg-gold text-black font-bold py-4 rounded-xl uppercase tracking-widest text-sm shadow-xl">
                    Pilih Film & Daftar
                </button>
            </div>
        </div>
    </div>

    <div id="floating-cta" class="fixed bottom-6 right-6 hidden">
        <button onclick="scrollToRegistration()" class="bg-gold text-black p-4 rounded-full shadow-2xl flex items-center gap-2 font-bold animate-bounce">
            <i data-lucide="arrow-down"></i> <span class="text-xs uppercase">Daftar</span>
        </button>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8s_2p-oYoTyGwuAzs61-XpQpSSHifSUSEWOVqTTSymelrS3qNerafyWmvTl_H121RlQ/exec"; 

        const MOVIES = [
            { id: 1, title: "Dia?", time: "09.10 – 09.25", poster: "dia.jpg", syn: "Seorang siswa kelas 3 SMA mulai berperilaku berbeda setelah dua minggu sebelumnya seorang adik kelas tersenyum kepadanya. Perubahan sikap itu memicu berbagai kejadian lucu dan canggung." },
            { id: 2, title: "2/4 Kawan", time: "09.27 – 09.42", poster: "24kawan.jpg", syn: "Una, Ciya, Rafa, dan Bagas menjalin persahabatan sejak kelas 10. Namun seiring waktu, pergaulan dan kesibukan membuat hubungan mereka perlahan merenggang." },
            { id: 3, title: "The Sound of Us", time: "09.44 – 09.59", poster: "soundofus.jpg", syn: "Sekelompok siswa SMA menghadapi tekanan menjelang kelulusan antara mimpi, ekonomi, dan tuntutan orang tua." },
            { id: 4, title: "Titik Tengah", time: "10.01 – 10.16", poster: "titiktengah.jpg", syn: "Tiga tipe siswa—akademik, nonakademik, dan pemalas—menghadapi tekanan ujian dengan cara berbeda." },
            { id: 5, title: "Diantara Kita", time: "10.18 – 10.33", poster: "diantarakita.jpg", syn: "Aluna dan Rafa adalah sahabat dekat, namun Rafa diam-diam menyimpan perasaan terhadap Aluna." },
            { id: 6, title: "Dua Sisi Kursi", time: "10.35 – 10.50", poster: "duasisikursi.jpg", syn: "Dua sahabat dekat menjadi renggang karena memilih jurusan yang sama dalam SNBP." },
            { id: 7, title: "Broken Symphony", time: "10.52 – 11.07", poster: "brokensymphony.jpg", syn: "Vivi kehilangan kepercayaan diri setelah gagal dalam tes bakat. Kisah tentang menemukan kembali keberanian diri." },
            { id: 8, title: "Hening di Tengah Suara", time: "11.09 – 11.24", poster: "heningdisuara.jpg", syn: "Kisah siswa pendiam yang ingin bersosialisasi namun terhalang oleh perlakuan buruk sekitarnya." },
            { id: 9, title: "Irama Dua Nada", time: "11.26 – 11.41", poster: "iramaduanada.jpg", syn: "Konflik kakak dan adik dengan minat seni berbeda saat harus bekerja sama dalam pertunjukan." },
            { id: 10, title: "Melo Di Balik Panggung", time: "11.43 – 11.58", poster: "melodibalikpanggung.jpg", syn: "Seorang siswi berjuang menyeimbangkan antara ekonomi keluarga dan pendidikan." },
            { id: 11, title: "Langkah Yang Salah", time: "12.30 – 12.45", poster: "langkahsalah.jpg", syn: "Kendala teknis dan emosional seorang siswi saat mengejar mimpi melalui lomba seni." },
            { id: 12, title: "Mungkin", time: "12.47 – 13.02", poster: "mungkin.jpg", syn: "Persaingan akademik dua sahabat yang berujung pada pertanyaan tentang arti keberhasilan." },
            { id: 13, title: "Derap Sunyi", time: "13.04 – 13.19", poster: "derapsunyi.jpg", syn: "Perjuangan Handy mengurus keluarga setelah ayahnya wafat di tengah tekanan sekolah." },
            { id: 14, title: "Meraih Cahaya", time: "13.21 – 13.36", poster: "meraihcahaya.jpg", syn: "Siswa bermasalah yang mulai berubah setelah menemukan harapan dan tujuan hidup baru." },
            { id: 15, title: "Dari Rakyat", time: "13.38 – 13.53", poster: "dariRakyat.jpg", syn: "Tika, seorang idealis, berjuang melawan ketidakadilan politik demi kepentingan masyarakat." },
            { id: 16, title: "Terlena Dalam Waktu", time: "13.55 – 14.10", poster: "terlena.jpg", syn: "Penyesalan seorang siswa yang terlalu asyik bermain game hingga masa depannya terancam." },
            { id: 17, title: "Isak Pertiwi", time: "14.12 – 14.27", poster: "isakpertiwi.jpg", syn: "Gelisah pelajar melihat alam yang rusak dan usahanya mengajak teman-teman peduli lingkungan." },
            { id: 18, title: "Melodi Untuk Ibu", time: "14.29 – 14.44", poster: "melodiuntukibu.jpg", syn: "Gadis desa berjuang menjadi penyanyi demi membahagiakan ibunya meski dalam keterbatasan." }
        ];

        let selectedMovies = [];

        function renderPosterGrid() {
            const grid = document.getElementById('poster-grid');
            grid.innerHTML = MOVIES.map(movie => `
                <div class="movie-card bg-neutral-900 rounded-2xl overflow-hidden relative shadow-lg" onclick="openModal(${movie.id})" id="card-${movie.id}">
                    <img src="${movie.poster}" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 w-full p-2 bg-black/80 backdrop-blur-sm">
                        <p class="text-[9px] font-bold truncate text-white uppercase">${movie.title}</p>
                        <p class="text-[8px] text-gold font-bold">${movie.time}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const movie = MOVIES.find(m => m.id === id);
            const modal = document.getElementById('movie-modal');
            const selectBtn = document.getElementById('modal-select-btn');
            
            document.getElementById('modal-img').src = movie.poster;
            document.getElementById('modal-title').innerText = movie.title;
            document.getElementById('modal-time').innerText = movie.time;
            document.getElementById('modal-synopsis').innerText = movie.syn;
            
            const isSelected = selectedMovies.some(m => m.id === id);
            selectBtn.innerText = isSelected ? "BATALKAN PILIHAN" : "PILIH FILM INI";
            selectBtn.className = isSelected ? "w-full bg-red-600 text-white font-bold py-4 rounded-xl uppercase text-sm" : "w-full bg-gold text-black font-bold py-4 rounded-xl uppercase text-sm";
            
            selectBtn.onclick = () => { 
                toggleSelect(id); 
                closeModal();
                if (!isSelected) {
                    scrollToRegistration();
                }
            };
            modal.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('movie-modal').classList.add('hidden'); }

        function toggleSelect(id) {
            const card = document.getElementById(`card-${id}`);
            const index = selectedMovies.findIndex(m => m.id === id);
            
            if(index > -1) {
                selectedMovies.splice(index, 1);
                card.classList.remove('selected');
            } else {
                selectedMovies.push(MOVIES.find(m => m.id === id));
                card.classList.add('selected');
            }
            
            const count = selectedMovies.length;
            document.getElementById('selection-count').innerText = `${count} Terpilih`;
            document.getElementById('floating-cta').classList.toggle('hidden', count === 0);
        }

        function scrollToRegistration() {
            document.getElementById('registration-section').scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('reservationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(selectedMovies.length === 0) return alert("Pilih film dulu di atas!");

            const btn = document.getElementById('btn-reserve');
            btn.disabled = true;
            btn.innerText = "MENYIMPAN...";

            const payload = {
                phase: 'RESERVE',
                name: document.getElementById('reg-name').value,
                class: document.getElementById('reg-class').value,
                phone: document.getElementById('reg-phone').value,
                movies: selectedMovies.map(m => m.title).join(', ')
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            } catch(e) {}

            document.getElementById('disp-name').innerText = payload.name;
            document.getElementById('disp-class').innerText = payload.class;
            document.getElementById('disp-movies').innerText = payload.movies;
            document.getElementById('ticket-poster-row').innerHTML = selectedMovies.map(m => `<img src="${m.poster}" class="w-12 h-18 rounded-md border border-gold/30">`).join('');
            
            document.getElementById('movie-section').classList.add('hidden');
            document.getElementById('registration-section').classList.add('hidden');
            document.getElementById('floating-cta').classList.add('hidden');
            document.getElementById('view-ticket').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        async function downloadTicket() {
            const ticket = document.getElementById('ticket-capture');
            const canvas = await html2canvas(ticket, { backgroundColor: '#0a0a0a', scale: 3 });
            const link = document.createElement('a');
            link.download = `Tiket_Cinema26.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        window.onload = () => { renderPosterGrid(); lucide.createIcons(); };
    </script>
</body>
</html>
